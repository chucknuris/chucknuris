<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Nuris Samardzic — Software Engineer, Vienna. Build what lasts.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F16"/>
      <stop offset="1" stop-color="#0B1622"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="16%" r="62%">
      <stop offset="0" stop-color="#00B4D8" stop-opacity="0.24"/>
      <stop offset="55%" stop-color="#0090B1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0090B1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="16%" cy="86%" r="55%">
      <stop offset="0" stop-color="#0090B1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0090B1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EAF7FB"/>
      <stop offset="0.52" stop-color="#88DBEE"/>
      <stop offset="1" stop-color="#00B4D8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>
  <rect width="1200" height="320" fill="url(#glow2)"/>

  <!-- faint constellation -->
  <g fill="#00B4D8" opacity="0.55">
    <circle cx="120" cy="66" r="1.6"/>
    <circle cx="214" cy="120" r="1.2"/>
    <circle cx="86" cy="232" r="1.3"/>
    <circle cx="1044" cy="248" r="1.6"/>
    <circle cx="978" cy="86" r="1.2"/>
    <circle cx="1122" cy="150" r="1.5"/>
  </g>
  <g stroke="#00B4D8" stroke-width="1" opacity="0.13">
    <line x1="120" y1="66" x2="214" y2="120"/>
    <line x1="978" y1="86" x2="1122" y2="150"/>
    <line x1="1122" y1="150" x2="1044" y2="248"/>
  </g>

  <!-- name -->
  <text x="600" y="146" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="76" letter-spacing="5" fill="url(#name)">NURIS SAMARDŽIĆ</text>

  <!-- tagline -->
  <text x="600" y="208" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="600" font-size="30" fill="#EAF6FA">Build what lasts<tspan fill="#00B4D8">.</tspan></text>

  <!-- teal underline -->
  <rect x="536" y="226" width="128" height="3" rx="1.5" fill="#00B4D8"/>

  <!-- role label -->
  <text x="600" y="268" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500" font-size="14.5" letter-spacing="6" fill="#6FA6B7">SOFTWARE ENGINEER&#160;&#160;·&#160;&#160;VIENNA&#160;&#160;·&#160;&#160;SOLVING REAL PROBLEMS</text>
</svg>
